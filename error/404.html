<!--CSS PAGE-->
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    font-family: Arial, sans-serif;
}

.container {
    background-image: url('/imgs/link-bg-v5.png'); /* Lien vers ton image de fond */
    background-size: cover;
    background-position: center;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.content {
    max-width: 600px;
    width: 100%;
}

.logo {
    max-width: 140px;
    width: 100%;
    margin-bottom: 20px;
}

.content h1 {
    font-size: 150px;
    color: white;
    margin-bottom: 20px;
}

.content p {
    font-size: 18px;
    color: white;
    margin-bottom: 10px;
}

/* Responsive styling */
@media (max-width: 768px) {
    .content h1 {
        font-size: 100px;
    }

    .content p {
        font-size: 16px;
    }

    .logo {
        max-width: 120px;
    }
}

@media (max-width: 480px) {
    .content h1 {
        font-size: 70px;
    }

    .content p {
        font-size: 14px;
    }

    .logo {
        max-width: 100px;
    }
}


/* Bouton yuwind */
.btn-yuwind {
    display: inline-block;
    padding: 12px 24px;
    font-size: 16px;
    color: white;
    background-color: #38a5ff; 
    text-align: center;
    text-decoration: none;
    border-radius: 5px;
    transition: background-color 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.btn-yuwind:hover {
    background-color: #154c79; 
    transform: scale(1.05); 
}

.btn-yuwind:active {
    background-color: #154c79; 
    transform: scale(0.98); 
}
</style>
