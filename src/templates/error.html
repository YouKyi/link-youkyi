<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page introuvable | {{TITLE}}</title>
    <meta name="theme-color" content="{{THEME_COLOR}}">
    <link rel="icon" href="{{AVATAR}}">
    <!-- Styles servis depuis la feuille compilée (classes .error-*), pas d'inline : CSP stricte conservée. -->
    <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="error-page">
    <div class="error-card">
        <p class="error-code">404</p>
        <p class="error-title">Page introuvable</p>
        <p class="error-text">Nous sommes désolés, la page que vous recherchez est indisponible ou introuvable.</p>
        <a href="{{OG_URL}}" class="error-btn">Revenir à l'accueil</a>
    </div>
</body>
</html>
